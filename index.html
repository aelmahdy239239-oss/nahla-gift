<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>إلى شخص مميز 🤍</title>

    <!-- CSS -->

    <link rel="stylesheet" href="style.css" />

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Loading Screen -->

    <div class="loading">
      <div class="loader-heart">❤️</div>

      <h2>لحظة واحدة...</h2>

      <p>نحضر لك شيئاً مميزاً 🤍</p>
    </div>

    <!-- Background Effects -->

    <div class="particles"></div>

    <div class="flowers">
      <img src="images/download (1).jpg" class="flower1" />

      <img src="images/download (2).jpg" class="flower2" />

      <img src="images/download (4).jpg" class="flower4" />
    </div>

    <!-- Flying Hearts -->

    <div class="hearts"></div>

    <!-- Login Section -->

    <main class="login-container">
      <div class="login-card">
        <div class="logo">🌹</div>

        <h1>أهلاً بك</h1>

        <h3>هذه الصفحة صنعت خصيصاً لك</h3>

        <p>هناك لحظات وأشخاص يستحقون أن نحفظ لهم مكاناً جميلاً 🤍</p>

        <div class="input-box">
          <input type="password" id="password" placeholder="أدخل كلمة المرور" />
        </div>

        <button id="enterBtn">دخول ✨</button>

        <span id="error"> </span>
      </div>
    </main>

    <!-- JavaScript -->

    <script src="script.js"></script>
  </body>
</html>
